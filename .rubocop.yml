AllCops:
  TargetRubyVersion: 3.1
  NewCops: disable
  Exclude:
    - "benchmarks/**/*"
    - "vendor/**/*"
    - "tmp/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Keep the lint focused on correctness/consistency rather than size heuristics.
Metrics:
  Enabled: false

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Enabled: false
