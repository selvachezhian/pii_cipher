name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # Ask the oxidize-rb toolchain which platforms and stable Ruby versions the
  # current rb-sys release can actually cross-compile for, instead of hardcoding
  # a list that drifts out of date (and missed Ruby 3.4/4.0 in v0.1.0).
  ci-data:
    name: Fetch CI data
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - uses: oxidize-rb/actions/fetch-ci-data@v1
        id: fetch
        with:
          # x64-mingw32 is legacy 32-bit Windows; rb-sys has no cross-compile
          # task for it (modern Windows uses x64-mingw-ucrt), so it always fails.
          supported-ruby-platforms: |
            exclude: ["x64-mingw32"]
          stable-ruby-versions: |
            exclude: ["head"]

  build-native-gems:
    name: Build native gem (${{ matrix.platform }})
    needs: ci-data
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@v4
      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cargo-cache: true
      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: ${{ join(fromJSON(needs.ci-data.outputs.result).stable-ruby-versions, ',') }}
      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}

  build-source-gem:
    name: Build source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oxidize-rb/actions/setup-ruby-and-rust@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          cargo-cache: true
      - run: bundle exec rake build
      - uses: actions/upload-artifact@v4
        with:
          name: gem-source
          path: pkg/*.gem

  push:
    name: Push to RubyGems
    needs: [build-native-gems, build-source-gem]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gem-*
          merge-multiple: true
          path: gems/
      - name: Push all gems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          for gem in gems/*.gem; do
            echo "Pushing $gem"
            gem push "$gem"
          done
